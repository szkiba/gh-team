name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # Tests are gated here, not just on PRs, so a tag cannot ship a binary
      # the test suite would have flagged. Without this step the precompile
      # action would happily build and publish a failing tree.
      - name: Test
        run: go test ./internal/ownership/

      - name: Build and publish release binaries
        uses: cli/gh-extension-precompile@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          go_version: '1.25'
